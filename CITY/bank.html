<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent City - Ngân Hàng Trung Tâm</title>
    <!-- Nhúng file CSS quy chuẩn dùng chung toàn thành phố của bạn -->
    <link rel="stylesheet" href="main.css">
    <style>
        /* CSS biệt lập tối ưu riêng cho không gian hiển thị bên trong Iframe Ngân Hàng */
        body {
            padding: 25px;
            box-sizing: border-box;
            background-color: var(--white-pure);
            color: var(--black-pure);
        }
        .bank-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }
        /* Khối hiển thị số dư siêu sang trọng */
        .balance-card {
            border: 2px solid var(--black-pure);
            padding: 30px;
            background-color: var(--gray-light);
            text-align: center;
        }
        body.dark-theme .balance-card {
            border: 2px solid var(--white-pure);
            background-color: #1a1a1a;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        /* Khung phân chia hai cột dưới: Giao dịch và Lịch sử */
        .bank-main {
            display: flex;
            gap: 25px;
        }
        .bank-column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div class="bank-layout">
        <div class="city-title">🏦 Ngân Hàng Trung Tâm Independent City</div>

        <!-- KHỐI HIỂN THỊ SỐ DƯ TÀI KHOẢN THỜI GIAN THỰC -->
        <div class="balance-card">
            <span style="font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; color: #718096;">Số dư ví điện tử hiện tại</span>
            <div class="balance-amount"><span id="liveBalanceAmount">1,000,000</span> <span style="font-size: 20px; font-weight: 700;">AD</span></div>
        </div>

        <!-- BỐ CỤC PHÂN PHÒNG CHỨA CỔNG GIAO DỊCH -->
        <div class="bank-main">
            <!-- Cột trái: Biểu mẫu thông tin giao dịch chuyển khoản liên cư dân -->
            <div class="bank-column" style="border-right: 1px solid var(--black-pure); padding-right: 25px;">
                <div style="font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--black-pure); padding-bottom: 5px; margin-bottom: 15px;">💸 Chuyển Khoản Liên Cư Dân</div>
                
                <form id="cityTransferForm" onsubmit="executeTransaction(event)">
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Tên tài khoản người nhận:</label>
                        <input type="text" id="targetReceiverInput" class="city-input" placeholder="Nhập chính xác Username..." required autocomplete="off">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Số tiền muốn chuyển (Đơn vị: AD):</label>
                        <input type="number" id="transferAmountInput" class="city-input" min="1" placeholder="Nhập số tiền AD..." required>
                    </div>
                    
                    <button type="submit" class="city-btn" style="width: 100%;">Khởi tác chuyển khoản ⚡</button>
                </form>
            </div>
            
            <script>
                // Đồng bộ giao diện tối từ file chủ ngay lập tức trước khi chạy script nâng cao
                if (window.parent.document.body.classList.contains('dark-theme')) {
                    document.body.classList.add('dark-theme');
                }
            </script>
                        <!-- Cột phải: Bảng lưới hiển thị lịch sử biến động số dư dòng tiền -->
            <div class="bank-column" id="bankHistoryColumn">
                <div style="font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--black-pure); padding-bottom: 5px; margin-bottom: 15px;">📜 Lịch Sử Giao Dịch Dòng Tiền</div>
                
                <!-- Vùng danh sách lịch sử biến động động -->
                <div id="bankHistoryArea" style="flex: 1; overflow-y: auto; max-height: 280px; border: 1px dashed var(--black-pure); padding: 10px;">
                    <p style="color: #718096; font-size: 12px; font-style: italic; text-align: center; margin-top: 100px;">Chưa ghi nhận biến động dòng tiền AD nào trong phiên làm việc này...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tự động xử lý viền kẻ dashed chuyển sang màu trắng nếu file chủ đang bật chế độ tối -->
    <script>
        if (window.parent.document.body.classList.contains('dark-theme')) {
            document.getElementById("bankHistoryArea").style.border = "1px dashed var(--white-pure)";
            const column = document.querySelector('.bank-column');
            if (column) column.style.borderRight = "1px solid var(--white-pure)";
        }
    </script>
        <!-- =========================================================
         BỘ NÃO JAVASCRIPT XỬ LÝ LOGIC NGÂN HÀNG - PHẦN 3
         ========================================================= -->
    <script type="module">
        // Nhập trạm kết nối cơ sở dữ liệu và hàm báo popup từ file tiện ích toàn cục
        import { clientDB, showNotificationPopup } from './utils.js';

        let CURRENT_USER = "";
        let CURRENT_BALANCE = 1000000;

        document.addEventListener("DOMContentLoaded", async () => {
            // Tự động bốc danh tính cư dân từ file chủ truyền xuống
            CURRENT_USER = window.parent.LOGGED_IN_USER;
            
            if (!CURRENT_USER) {
                console.error("Lỗi: Không tìm thấy phiên làm việc hợp lệ của cư dân ngân hàng!");
                return;
            }

            // Tải số dư tài khoản thực tế từ bảng city_bank trên Supabase
            await refreshBalanceFromCloud();

            // KÍCH HOẠT LẮNG NGHE BIẾN ĐỘNG VÍ TIỀN REALTIME (WEBSOCKETS) [🗎1]
            // Khi có ai đó mua dịch vụ của bạn hoặc chuyển khoản cho bạn, số tiền tự nhảy số tăng lên!
            clientDB
                .channel('bank_realtime_ref')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'city_bank', filter: `username=eq.${CURRENT_USER}` }, payload => {
                    const oldBal = CURRENT_BALANCE;
                    CURRENT_BALANCE = payload.new.balance;
                    
                    // Cập nhật con số hiển thị mượt mà ra màn hình
                    document.getElementById("liveBalanceAmount").innerText = CURRENT_BALANCE.toLocaleString("vi-VN");
                    
                    // Phát thông báo Popup giật từ góc màn hình nếu số tiền thay đổi [🗎1]
                    if (CURRENT_BALANCE > oldBal) {
                        showNotificationPopup("NGÂN HÀNG", `Tài khoản của bạn vừa ĐƯỢC CỘNG +${(CURRENT_BALANCE - oldBal).toLocaleString()} AD thời gian thực! 💰`);
                    } else if (CURRENT_BALANCE < oldBal) {
                        showNotificationPopup("NGÂN HÀNG", `Tài khoản của bạn vừa BỊ TRỪ -${(oldBal - CURRENT_BALANCE).toLocaleString()} AD giao dịch thành công! 💸`);
                    }
                })
                .subscribe();
        });

        // Hàm đọc số dư gốc từ đám mây nạp vào giao diện
        async function refreshBalanceFromCloud() {
            const { data: bankData, error } = await clientDB
                .from('city_bank')
                .select('balance')
                .eq('username', CURRENT_USER)
                .single();

            if (!error && bankData) {
                CURRENT_BALANCE = bankData.balance;
                document.getElementById("liveBalanceAmount").innerText = CURRENT_BALANCE.toLocaleString("vi-VN");
            }
        }

        // Tạo mảng ghi nhận lịch sử giao dịch tạm thời trên giao diện hiển thị
        window.logTransactionToUI = function(type, target, amount) {
            const area = document.getElementById("bankHistoryArea");
            // Xóa bỏ dòng chữ thông báo trống ban đầu nếu có
            if (area.innerHTML.includes("Chưa ghi nhận biến động")) area.innerHTML = "";

            const row = document.createElement("div");
            row.className = "city-card";
            row.style.cssText = "padding:10px; margin-bottom:8px; font-size:12px; border-style:dashed;";
            
            const time = new Date().toLocaleTimeString("vi-VN", { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            if (type === 'SEND') {
                row.innerHTML = `⏱️ <b>[${time}]</b> Chuyển khoản: Gửi tới <span style="font-weight:bold;">@${target}</span> <br> <span style="color:#e63946; font-weight:bold;">-${amount.toLocaleString()} AD</span>`;
            } else {
                row.innerHTML = `⏱️ <b>[${time}]</b> Giao dịch: Nhận tiền từ <span style="font-weight:bold;">@${target}</span> <br> <span style="color:#2ed573; font-weight:bold;">+${amount.toLocaleString()} AD</span>`;
            }
            
            area.insertBefore(row, area.firstChild); // Đẩy lịch sử mới nhất lên đầu bảng
        };
                // =========================================================
        // 7. THUẬT TOÁN THỰC THI GIAO DỊCH CHUYỂN KHOẢN AN TOÀN CLOUD
        // =========================================================
        window.executeTransaction = async function(event) {
            event.preventDefault(); // Chặn hành vi tải lại trang mặc định của biểu mẫu
            
            const receiverInput = document.getElementById("targetReceiverInput").value.trim();
            const amountInput = parseInt(document.getElementById("transferAmountInput").value);

            if (receiverInput === "" || isNaN(amountInput) || amountInput <= 0) {
                alert("Vui lòng nhập tên người nhận và số tiền chuyển hợp lệ!");
                return;
            }

            // LÁ CHẮN BẢO VỆ 1: Chặn đứng hành vi tự chuyển khoản cho chính mình
            if (receiverInput === CURRENT_USER) {
                alert("⚠️ Lỗi giao dịch: Bạn không thể tự chuyển khoản cho chính bản thân mình!");
                return;
            }

            // LÁ CHẮN BẢO VỆ 2: Kiểm tra số dư hiện tại của ví, chặn chi tiêu vượt mức
            if (amountInput > CURRENT_BALANCE) {
                alert(`⚠️ Giao dịch bị từ chối: Số dư tài khoản không đủ! Bạn hiện chỉ có ${CURRENT_BALANCE.toLocaleString()} AD.`);
                return;
            }

            try {
                // LÁ CHẮN BẢO VỆ 3: Quét bảng city_bank xem Username người nhận có tồn tại thực tế không
                const { data: receiverWallet, error: checkErr } = await clientDB
                    .from('city_bank')
                    .select('*')
                    .eq('username', receiverInput)
                    .single();

                if (checkErr || !receiverWallet) {
                    alert(`⚠️ Lỗi hệ thống: Không tìm thấy cư dân nào mang tên tài khoản @${receiverInput} trong cơ sở dữ liệu!`);
                    return;
                }

                // --- TIẾN HÀNH THỰC THI DÒNG TIỀN SONG SONG ---
                // Bước A: Trừ tiền trực tiếp vào tài khoản của người gửi
                const newSenderBalance = CURRENT_BALANCE - amountInput;
                const { error: sendErr } = await clientDB
                    .from('city_bank')
                    .update({ balance: newSenderBalance })
                    .eq('username', CURRENT_USER);

                if (sendErr) {
                    alert("Giao dịch thất bại tại bước khấu trừ tài khoản!");
                    return;
                }

                // Bước B: Cộng tiền trực tiếp vào tài khoản của người nhận trên Cloud
                const newReceiverBalance = receiverWallet.balance + amountInput;
                await clientDB
                    .from('city_bank')
                    .update({ balance: newReceiverBalance })
                    .eq('username', receiverInput);

                // --- KẾT THÚC GIAO DỊCH THÀNH CÔNG ---
                // Cập nhật lại số dư tạm thời ở phía Frontend
                CURRENT_BALANCE = newSenderBalance;
                document.getElementById("liveBalanceAmount").innerText = CURRENT_BALANCE.toLocaleString("vi-VN");

                // Vẽ lịch sử giao dịch ngay lập tức ra bảng lưới cột phải
                window.logTransactionToUI('SEND', receiverInput, amountInput);

                // Sát trùng dọn sạch các ô nhập liệu của form
                document.getElementById("targetReceiverInput").value = "";
                document.getElementById("transferAmountInput").value = "";

                // Bắn popup thông báo giật góc màn hình ăn mừng
                showNotificationPopup("GIAO DỊCH", `Đã chuyển khoản thành công ${amountInput.toLocaleString()} AD tới cư dân @${receiverInput}! 💸`);

            } catch (err) {
                console.error("Trục trặc đường truyền giao dịch:", err.message);
                alert("Hệ thống ngân hàng gặp sự cố đường truyền mạng!");
            }
        };
    </script>
</body>
</html>
