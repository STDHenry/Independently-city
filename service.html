<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent City - Chợ Dịch Vụ Tự Doanh</title>
    <!-- Nhúng file CSS quy chuẩn dùng chung toàn thành phố của bạn -->
    <link rel="stylesheet" href="main.css">
    <style>
        /* CSS biệt lập tối ưu riêng cho không gian hiển thị bên trong Iframe Chợ Dịch Vụ */
        body {
            padding: 25px;
            box-sizing: border-box;
            background-color: var(--white-pure);
            color: var(--black-pure);
        }
        .market-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }
        /* Thanh điều khiển phụ lật 2 Tab Mua / Bán bên trong trang dịch vụ */
        .market-ctrl-bar {
            display: flex;
            border: 1px solid var(--black-pure);
            margin-bottom: 5px;
        }
        body.dark-theme .market-ctrl-bar { border: 1px solid var(--white-pure); }
        
        .ctrl-tab {
            flex: 1; padding: 12px; text-align: center; font-weight: bold;
            cursor: pointer; text-transform: uppercase; font-size: 13px;
            transition: all 0.2s ease-in-out;
        }
        .ctrl-tab:first-child { border-right: 1px solid var(--black-pure); }
        body.dark-theme .ctrl-tab:first-child { border-right: 1px solid var(--white-pure); }
        
        .ctrl-tab:hover, .ctrl-tab.active {
            background-color: var(--navy-dark); color: var(--white-pure);
        }
        /* Các phân khu ruột ẩn hiện luân phiên */
        .market-panel { display: none; flex-direction: column; gap: 15px; }
        .market-panel.active { display: flex; }
        
        /* Thiết kế nút bấm dấu cộng tạo sản phẩm vuông vức */
        .add-plus-btn {
            font-size: 24px; font-weight: bold; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--black-pure); background-color: var(--white-pure);
            cursor: pointer; transition: all 0.2s; margin-bottom: 15px;
        }
        .add-plus-btn:hover { background-color: var(--black-pure); color: var(--white-pure); transform: scale(1.05); }
        body.dark-theme .add-plus-btn { border-color: var(--white-pure); background-color: var(--black-pure); color: var(--white-pure); }
        body.dark-theme .add-plus-btn:hover { background-color: var(--white-pure); color: var(--black-pure); }
    </style>
</head>
<body>

    <div class="market-layout">
        <div class="city-title">🛒 Chợ Dịch Vụ Tự Doanh Independent City</div>

        <!-- THANH ĐIỀU KHIỂN PHỤ: LẬT 2 CHẾ ĐỘ MUA / BÁN -->
        <div class="market-ctrl-bar">
            <div id="tabCtrlBuy" class="ctrl-tab active" onclick="switchMarketView('panel-buy')">🛍️ Khu Vực Mua Hàng</div>
            <div id="tabCtrlSell" class="ctrl-tab" onclick="switchMarketView('panel-sell')">💼 Khu Vực Đăng Bán</div>
        </div>

        <!-- =========================================================
             PHÂN KHU BÁN: NƠI QUẢN LÝ VÀ ĐĂNG TẢI DỊCH VỤ CÁ NHÂN
             ========================================================= -->
        <div id="panel-sell" class="market-panel">
            <div style="font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">➕ Đăng Tải Sản Phẩm / Dịch Vụ Mới</div>
            
            <!-- Nút bấm dấu cộng mở rộng ẩn/hiện biểu mẫu điền thông tin -->
            <div class="add-plus-btn" onclick="toggleNewServiceForm()">+</div>
            
            <!-- Biểu mẫu nhập liệu (Mặc định ẩn ngầm, bấm dấu + mới bung ra) -->
            <div id="newServiceFormBox" class="city-card" style="display: none; padding: 25px;">
                <form id="cityUploadProductForm" onsubmit="publishNewService(event)">
                    <div style="margin-bottom: 12px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Tên sản phẩm / dịch vụ:</label>
                        <input type="text" id="prodTitleInput" class="city-input" placeholder="Ví dụ: Thiết kế Banner, Khảo sát code..." required>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Mô tả chi tiết sản phẩm:</label>
                        <textarea id="prodDescInput" class="city-input" style="height: 60px; font-family: inherit; resize: none;" placeholder="Điền thông tin giới thiệu ngắn gọn..." required></textarea>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Đường dẫn ảnh minh họa (URL URL):</label>
                        <input type="url" id="prodImageInput" class="city-input" placeholder="Dán link ảnh từ internet (Có thể rỗng)...">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Giá niêm yết (Hạn mức trần: 1 - 1000 AD):</label>
                        <input type="number" id="prodPriceInput" class="city-input" min="1" max="1000" placeholder="Nhập mức giá AD..." required>
                    </div>
                    <button type="submit" class="city-btn">Phát hành lên mạng lưới ⚡</button>
                </form>
            </div>
        </div>
        
        <!-- BIẾN PHỤ ĐỒNG BỘ MÀU GIAO DIỆN TỐI NẾU CÓ -->
        <script>
            if (window.parent.document.body.classList.contains('dark-theme')) {
                document.body.classList.add('dark-theme');
            }
        </script>
                <!-- =========================================================
             PHÂN KHU MUA: NƠI TRƯNG BÀY VÀ TÌM KIẾM CHỢ TỔNG HỢP CƯ DÂN
             ========================================================= -->
        <div id="panel-buy" class="market-panel active">
            <!-- Thanh tìm kiếm nhanh sản phẩm nội bộ -->
            <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                <input type="text" id="marketSearchInput" class="city-input" placeholder="Nhập tên sản phẩm cần lọc nhanh trên chợ...">
                <button class="city-btn" onclick="filterMarketProducts()">Lọc</button>
            </div>

            <!-- Bảng lưới lưới chứa danh sách sản phẩm hiển thị (Tự động cuộn khi quá dài) -->
            <div id="marketProductsGrid" style="flex: 1; overflow-y: auto; max-height: 400px; display: flex; flex-direction: column; gap: 15px; padding-right: 5px;">
                <!-- Dữ liệu sản phẩm và hộp 100 đánh giá sao sẽ được nạp động từ Supabase qua JS ở đợt sau -->
                <p style="color: #718096; font-size: 13px; font-style: italic; text-align: center; margin-top: 100px;">Hệ thống đang đồng bộ danh mục dịch vụ từ đám mây...</p>
            </div>
        </div>

    </div>

    <!-- Đoạn mã xử lý luồng hiển thị Tab động nội bộ và đóng mở form dấu + -->
    <script>
        // Hàm lật 2 Tab Mua / Bán cơ học phía Frontend
        window.switchMarketView = function(panelId) {
            document.querySelectorAll('.market-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.ctrl-tab').forEach(t => t.classList.remove('active'));

            document.getElementById(panelId).classList.add('active');
            if (panelId === 'panel-buy') {
                document.getElementById('tabCtrlBuy').classList.add('active');
                if (window.loadMarketDataCloud) window.loadMarketDataCloud(); // Tự động làm mới chợ khi bấm về tab mua
            } else {
                document.getElementById('tabCtrlSell').classList.add('active');
            }
        };

        // Hàm ẩn hiện form đăng đồ khi click vào dấu +
        window.toggleNewServiceForm = function() {
            const formBox = document.getElementById("newServiceFormBox");
            const plusBtn = document.querySelector(".add-plus-btn");
            if (formBox.style.display === "none") {
                formBox.style.display = "block";
                plusBtn.innerText = "-";
            } else {
                formBox.style.display = "none";
                plusBtn.innerText = "+";
            }
        };
    </script>
        <!-- =========================================================
         BỘ NÃO JAVASCRIPT XỬ LÝ LOGIC CHỢ DỊCH VỤ - PHẦN 3
         ========================================================= -->
    <script type="module">
        // Nhập trạm kết nối cơ sở dữ liệu và hàm báo popup từ file tiện ích toàn cục
        import { clientDB, showNotificationPopup } from './utils.js';

        let CURRENT_USER = "";
        let GLOBAL_PRODUCTS_LIST = []; // Mảng bộ nhớ đệm lưu danh sách sản phẩm phục vụ bộ lọc nhanh

        document.addEventListener("DOMContentLoaded", async () => {
            // Tự động bốc danh tính cư dân từ file chủ truyền xuống
            CURRENT_USER = window.parent.LOGGED_IN_USER;
            
            if (!CURRENT_USER) {
                console.error("Lỗi: Không tìm thấy phiên làm việc hợp lệ của cư dân chợ!");
                return;
            }

            // Tải danh sách sản phẩm công khai từ đám mây ngay khi mở tab
            await loadMarketDataCloud();
        });

        // ==========================================
        // 1. THUẬT TOÁN TẢI DANH SÁCH DỊCH VỤ TỪ CLOUD
        // ==========================================
        window.loadMarketDataCloud = async function() {
            const grid = document.getElementById("marketProductsGrid");
            
            try {
                const { data: services, error } = await clientDB
                    .from('city_services')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                GLOBAL_PRODUCTS_LIST = services || [];
                renderProductsToUI(GLOBAL_PRODUCTS_LIST);

            } catch (err) {
                console.error("Lỗi đồng bộ danh mục chợ:", err.message);
                grid.innerHTML = `<p style="color:#e63946; text-align:center; font-size:13px; margin-top:100px;">Lỗi: Không thể kết nối dữ liệu Chợ tự doanh đám mây!</p>`;
            }
        };

        // ==========================================
        // 2. THUẬT TOÁN PHÁT HÀNH DỊCH VỤ MỚI LÊN MÂY
        // ==========================================
        window.publishNewService = async function(event) {
            event.preventDefault(); // Chặn hành vi tải lại trang mặc định của form

            const title = document.getElementById("prodTitleInput").value.trim();
            const description = document.getElementById("prodDescInput").value.trim();
            const imageUrl = document.getElementById("prodImageInput").value.trim() || "https://unsplash.com"; // Ảnh mặc định nếu bỏ trống
            const price = parseInt(document.getElementById("prodPriceInput").value);

            if (title === "" || description === "" || isNaN(price)) {
                alert("Vui lòng điền đầy đủ thông tin sản phẩm bắt buộc!");
                return;
            }

            // LÁ CHẮN BẢO VỆ CHÍ CHẠM TRẦN: Kiểm tra nghiêm ngặt mức giá chặn trần không quá 1000 AD
            if (price < 1 || price > 1000) {
                alert("⚠️ Đăng tin bị từ chối: Theo quy định phi doanh nghiệp độc lập, giá bán của 1 sản phẩm bắt buộc phải nằm trong khoảng từ 1 đến 1000 AD!");
                return;
            }

            try {
                // Đẩy bản ghi sản phẩm mới lên bảng city_services với mảng reviews rỗng ban đầu
                const { error } = await clientDB
                    .from('city_services')
                    .insert([{
                        seller: CURRENT_USER,
                        title: title,
                        description: description,
                        price: price,
                        image_url: imageUrl,
                        reviews: [] // Hộp đánh giá khởi tạo trống, giới hạn 100 lượt sau này
                    }]);

                if (error) throw error;

                // --- ĐĂNG TẢI THÀNH CÔNG ---
                showNotificationPopup("CHỢ TỰ DOANH", `Sản phẩm [${title}] của bạn đã được phát hành thành công với giá ${price} AD! 🛒`);
                
                // Reset làm sạch form nhập liệu và thu nhỏ dấu + lại
                document.getElementById("cityUploadProductForm").reset();
                window.toggleNewServiceForm();

                // Tự động tải lại danh sách chợ để cập nhật món đồ mới lên đầu trang
                await loadMarketDataCloud();

            } catch (err) {
                alert("Gặp sự cố khi đẩy thông tin lên đám mây: " + err.message);
            }
        };
                // =========================================================
        // 3. THUẬT TOÁN RENDERING ĐỒ HỌA CHỢ VÀ HỘP ĐÁNH GIÁ SAO
        // =========================================================
        function renderProductsToUI(products) {
            const grid = document.getElementById("marketProductsGrid");
            grid.innerHTML = "";

            if (products.length === 0) {
                grid.innerHTML = `<p style="color:#718096; text-align:center; font-size:13px; margin-top:100px;">Không tìm thấy dịch vụ nào đang đăng bán...</p>`;
                return;
            }

            products.forEach(p => {
                const isMyOwn = (p.seller === CURRENT_USER);
                
                // Tính toán điểm số đánh giá trung bình và số lượng (Giới hạn 100)
                const revArray = p.reviews || [];
                let avgStars = 0;
                if (revArray.length > 0) {
                    const totalStars = revArray.reduce((acc, cur) => acc + parseInt(current_star_fixed(cur.stars)), 0);
                    avgStars = (totalStars / revArray.length).toFixed(1);
                }

                // Thiết lập phom hiển thị danh sách đánh giá sao con
                let reviewsListHtml = "";
                revArray.slice(-5).forEach(r => { // Hiển thị 5 đánh giá mới nhất ra màn hình
                    reviewsListHtml += `
                        <div style="font-size:11px; border-top:1px dashed #cbd5e0; padding-top:4px; margin-top:4px;">
                            ⭐ <b>${r.stars}/5 Sao</b> bởi <i>@${r.reviewer}</i>: "${r.comment}"
                        </div>
                    `;
                });

                // Khối div card sản phẩm tối giản
                const card = document.createElement("div");
                card.className = "city-card";
                card.style.cssText = "display: flex; gap: 15px; padding: 15px; position:relative; align-items: flex-start;";

                card.innerHTML = `
                    <img src="${p.image_url}" style="width: 80px; height: 80px; object-fit: cover; border: 1px solid var(--black-pure);" alt="Product">
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-weight: 800; font-size: 15px; text-transform: uppercase;">${p.title}</div>
                        <div style="font-size: 12px; color: #718096; margin-top: 3px; margin-bottom: 5px;">Người bán: <b>@${p.seller}</b> | Đánh giá: <b>${revArray.length > 0 ? avgStars + ' ⭐' : 'Chưa có'}</b> (${revArray.length}/100)</div>
                        <div style="font-size: 13px; line-height: 1.4; word-break: break-word;">${p.description}</div>
                        
                        <!-- Khu vực hộp chứa tối đa 100 review con -->
                        <div style="margin-top:10px; background-color: var(--gray-light); padding: 5px 10px;" class="reviews-container-box">
                            <span style="font-size:11px; font-weight:bold; color:var(--navy-dark);">💬 Nhận xét của cư dân:</span>
                            ${revArray.length === 0 ? '<div style="font-size:11px; color:#a0aec0; italic">Chưa có đánh giá nào.</div>' : reviewsListHtml}
                        </div>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end; width: 120px;">
                        <div style="font-size: 18px; font-weight: 900; color: var(--navy-dark);" class="price-lbl">${p.price} AD</div>
                        ${isMyOwn ? 
                            `<span class="city-badge" style="background-color:#718096;">Đồ của bạn</span>` : 
                            `<button class="city-btn" style="padding: 6px 12px; font-size:11px;" onclick="window.purchaseServiceCloud(${p.id}, '${p.seller}', ${p.price})">MUA NGAY 🛒</button>`
                        }
                    </div>
                `;

                grid.appendChild(card);
            });

            // Ép viền trắng ảnh và card nếu file chủ đang ở Dark Mode
            if (window.parent.document.body.classList.contains('dark-theme')) {
                document.querySelectorAll('.reviews-container-box').forEach(b => b.style.backgroundColor = '#1a1a1a');
                document.querySelectorAll('.price-lbl').forEach(l => l.style.color = 'var(--white-pure)');
                document.querySelectorAll('img').forEach(i => i.style.borderColor = 'var(--white-pure)');
            }
        }

        // Tiện ích phụ tránh lỗi đọc sao
        function current_star_fixed(val) { return val || 5; }

        // =========================================================
        // 4. THUẬT TOÁN THANH LỌC LỌC NHANH SẢN PHẨM TRÊN CHỢ NỘI BỘ
        // =========================================================
        window.filterMarketProducts = function() {
            const keyword = document.getElementById("marketSearchInput").value.trim().toLowerCase();
            if (keyword === "") {
                renderProductsToUI(GLOBAL_PRODUCTS_LIST);
                return;
            }
            const filtered = GLOBAL_PRODUCTS_LIST.filter(p => p.title.toLowerCase().includes(keyword));
            renderProductsToUI(filtered);
        };

        // =========================================================
        // 5. THUẬT TOÁN MUA HÀNG LIÊN THÔNG VÍ NGÂN HÀNG & GHI ĐÁNH GIÁ
        // =========================================================
        window.purchaseServiceCloud = async function(prodId, sellerName, priceAmount) {
            const confirmBuy = confirm(`Bạn có chắc chắn muốn bỏ ra ${priceAmount} AD để mua dịch vụ này không? Hệ thống ngân hàng sẽ tự động khấu trừ số dư ví của bạn.`);
            if (!confirmBuy) return;

            try {
                // Bước A: Kiểm tra số dư tài khoản của người mua thực tế trong city_bank
                const { data: myWallet, error: buyErr } = await clientDB
                    .from('city_bank')
                    .select('*')
                    .eq('username', CURRENT_USER)
                    .single();

                if (buyErr || !myWallet) {
                    alert("Lỗi hệ thống: Không thể xác thực ví Ngân hàng của bạn!");
                    return;
                }

                if (myWallet.balance < priceAmount) {
                    alert(`⚠️ Giao dịch bị từ chối: Số dư ví của bạn hiện tại không đủ để thanh toán sản phẩm này (Bạn thiếu ${priceAmount - myWallet.balance} AD). Hãy vào tab Ngân hàng kiếm tiền hoặc xin khoản viện trợ!`);
                    return;
                }

                // Bước B: Kiểm tra số dư người bán
                const { data: sellerWallet, error: sellErr } = await clientDB
                    .from('city_bank')
                    .select('*')
                    .eq('username', sellerName)
                    .single();

                if (sellErr || !sellerWallet) {
                    alert("Lỗi: Người bán không tồn tại hoặc ví ngân hàng của họ bị khóa!");
                    return;
                }

                // --- KHỞI TÁC DÒNG TIỀN SONG SONG QUA ĐÁM MÂY SUPABASE ---
                // 1. Trừ tiền người mua
                await clientDB.from('city_bank').update({ balance: myWallet.balance - priceAmount }).eq('username', CURRENT_USER);
                // 2. Cộng tiền cho người bán
                await clientDB.from('city_bank').update({ balance: sellerWallet.balance + priceAmount }).eq('username', sellerName);

                showNotificationPopup("CHỢ TỰ DOANH", `Giao dịch thành công! Bạn đã thanh toán ${priceAmount} AD cho cư dân @${sellerName}. 💸`);

                // Bước C: Mở hộp thoại xin 1 trong tối đa 100 Đánh giá sao lọt thẳng vào bảng JSONB
                const comment = prompt("✍️ MỜI BẠN ĐÁNH GIÁ SẢN PHẨM:\nHãy để lại một dòng nhận xét ngắn về chất lượng dịch vụ:");
                let stars = prompt("Chọn số sao đánh giá (Nhập từ số 1 đến 5):", "5");
                
                stars = parseInt(stars);
                if (isNaN(stars) || stars < 1 || stars > 5) stars = 5; // Mặc định cho 5 sao nếu gõ bậy
                
                const cleanComment = comment ? comment.trim() : "Cư dân không để lại bình luận.";

                // Đọc bản ghi sản phẩm cũ để cập nhật thêm mảng JSONB đánh giá
                const targetProd = GLOBAL_PRODUCTS_LIST.find(x => x.id === prodId);
                if (targetProd) {
                    let currentReviews = targetProd.reviews || [];
                    
                    // Giới hạn cứng tối đa 100 lượt đánh giá, nếu vượt quá tự động đá lượt cũ nhất ra
                    if (currentReviews.length >= 100) currentReviews.shift();

                    currentReviews.push({
                        reviewer: CURRENT_USER,
                        stars: stars,
                        comment: cleanComment
                    });

                    // Cập nhật ngược mảng JSONB mới tinh đè lên bảng city_services trên mây [🗎1]
                    await clientDB
                        .from('city_services')
                        .update({ reviews: currentReviews })
                        .eq('id', prodId);
                }

                // Tải lại toàn bộ khu chợ để cập nhật ngay số sao và số lượt đánh giá
                await loadMarketDataCloud();

            } catch (err) {
                alert("Giao dịch gặp lỗi đường truyền mạng: " + err.message);
            }
        };
    </script>
</body>
</html>
