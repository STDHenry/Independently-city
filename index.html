<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent City - Trung Tâm Xử Lý Dịch Vụ Mạng</title>
    
    <!-- Nhúng thư viện Supabase JS gốc lên đầu trang để xử lý lõi dữ liệu đám mây -->
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="main.css">
    
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff; color: #000000;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        /* Khung hộp chứa tổng thể của siêu ứng dụng Independent City */
        .main-wrapper {
            width: 1000px; height: 720px; border: 2px solid #000000;
            display: flex; flex-direction: column; position: relative; background-color: #ffffff;
        }
        /* Thanh Navbar tổng điều hướng phối màu Xanh hải quân - Trắng - Đen của bạn */
        .city-navbar {
            display: flex; border-bottom: 2px solid #000000; background-color: #ffffff;
        }
        .nav-item {
            flex: 1; padding: 16px; text-align: center; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border-right: 1px solid #000000; font-size: 13px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s ease-in-out;
        }
        .nav-item:last-child { border-right: none; }
        .nav-item:hover, .nav-item.active {
            background-color: #001F3F; color: #ffffff;
        }
        /* Hệ thống kính khung Iframe biệt lập luồng dữ liệu của các file con */
        .content-frame {
            flex: 1; border: none; width: 100%; height: 100%; display: none;
        }
        .content-frame.active { display: block; }

        /* LỚP PHỦ GATEWAY CHẶN CỔNG ĐĂNG NHẬP VÀ ÉP KÝ ĐIỀU KHOẢN */
        .gate-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 100; display: flex; padding: 40px; box-sizing: border-box; gap: 40px;
        }
        .gate-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .terms-box {
            height: 280px; border: 1px solid #000000; padding: 15px; overflow-y: scroll;
            font-size: 13px; line-height: 1.6; background-color: #fafafa; margin-bottom: 15px;
        }
        /* Hộp chứa Toast Popup tự động nhảy lên ở góc màn hình từ utils.js */
        #notification-container {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- CỔNG GATEWAY CHẶN HOÀN TOÀN HỆ THỐNG NẾU CHƯA ĐẠT ĐIỀU KIỆN CHẤP THUẬN -->
        <div id="gateOverlay" class="gate-overlay">
            <!-- Cột bên trái: Văn bản Hợp đồng ký kết chấp thuận điều khoản cư dân -->
                        <!-- Form Đăng ký (Đã đồng bộ bộ lọc CSS Xanh hải quân - Đen - Trắng) -->
            <div class="gate-panel" id="registerFormBox" style="display: none;">
                <h2 style="margin-top:0; text-transform: uppercase; font-weight: 800; color: var(--navy-dark);">Khởi Tạo Danh Tính</h2>
                
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px; font-size:13px;">Tên tài khoản (Username độc nhất):</label>
                    <input type="text" id="regUser" class="city-input" placeholder="Ví dụ: STDHenry" autocomplete="off">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px; font-size:13px;">Email nhận mã xác thực thực tế:</label>
                    <input type="email" id="regEmail" class="city-input" placeholder="nhap-email-thuc-te@gmail.com" autocomplete="off">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px; font-size:13px;">Mật khẩu an toàn (Tối thiểu 6 ký tự):</label>
                    <input type="password" id="regPwd" class="city-input" placeholder="Thiết lập mật khẩu...">
                </div>
                
                <button class="city-btn" onclick="handleGatewayAuth('register')" style="width: 100%;">Gửi yêu cầu xác thực Mail ✉️</button>
                <p style="font-size:12px; margin-top:20px; cursor:pointer; text-decoration:underline;" onclick="window.toggleGateView(false)">Đã có tài khoản? Quay lại khung đăng nhập</p>
            </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                    <input type="checkbox" id="agreeCheckbox" style="width:18px; height:18px; cursor:pointer;">
                    <label for="agreeCheckbox" style="font-weight:bold; cursor:pointer; font-size: 14px;">Tôi xác nhận đồng ý và ký chấp thuận điều khoản trên ✍️</label>
                </div>
            </div>
                        <!-- =========================================================
                 MÀN HÌNH CỔNG CỘT PHẢI: FORM ĐĂNG NHẬP / ĐĂNG KÝ LINH HOẠT
                 ========================================================= -->
            <!-- Form Đăng nhập hòm thư -->
            <div class="gate-panel" id="loginFormBox">
                <h2 style="margin-top:0; text-transform: uppercase; font-weight: 800;">Đăng Nhập Hệ Thống</h2>
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px;">Địa chỉ Email:</label>
                    <input type="email" id="loginEmail" class="city-input" placeholder="nhap-email@gmail.com">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px;">Mật khẩu bảo mật:</label>
                    <input type="password" id="loginPwd" class="city-input" placeholder="Nhập mật khẩu...">
                </div>
                <button class="city-btn" onclick="handleGatewayAuth('login')">Xác nhận vào Thành Phố 🏠</button>
                <p style="font-size:12px; margin-top:20px; cursor:pointer; text-decoration:underline;" onclick="toggleGateView(true)">Chưa có tài khoản? Bấm vào đây để đăng ký tài khoản mới</p>
            </div>

            <!-- Form Đăng ký (Yêu cầu điền Tên, Email thực tế và Mật khẩu) -->
            <div class="gate-panel" id="registerFormBox" style="display: none;">
                <h2 style="margin-top:0; text-transform: uppercase; font-weight: 800; color: #001F3F;">Đăng Ký Tài Khoản Cư Dân</h2>
                <div style="margin-bottom: 12px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px;">Tên tài khoản (Username độc nhất):</label>
                    <input type="text" id="regUser" class="city-input" placeholder="Ví dụ: STDHenry">
                </div>
                <div style="margin-bottom: 12px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px;">Email nhận mã xác thực:</label>
                    <input type="email" id="regEmail" class="city-input" placeholder="nhap-email-thuc-te@gmail.com">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px;">Mật khẩu an toàn (Tối thiểu 6 ký tự):</label>
                    <input type="password" id="regPwd" class="city-input" placeholder="Thiết lập mật khẩu...">
                </div>
                <button class="city-btn" onclick="handleGatewayAuth('register')">Gửi yêu cầu xác thực Mail ✉️</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; text-decoration:underline;" onclick="toggleGateView(false)">Đã có tài khoản? Quay lại khung đăng nhập</p>
            </div>
        </div>

        <!-- =========================================================
             THANH NAVBAR TỔNG MANG BIỂU TƯỢNG EMOJI THEO ĐỀ XUẤT CỦA BẠN
             ========================================================= -->
        <div class="city-navbar">
            <div class="nav-item active" onclick="switchHubTab('page-hub')">🏠 Hub Chủ</div>
            <div class="nav-item" onclick="switchHubTab('page-bank')">🏦 Ngân Hàng</div>
            <div class="nav-item" onclick="switchHubTab('page-service')">🛒 Dịch Vụ</div>
            <div class="nav-item" onclick="switchHubTab('page-chat')">✉️ Tin Nhắn</div>
        </div>

        <!-- HỆ THỐNG PHÂN TÁCH LUỒNG DỮ LIỆU BẰNG IFRAME CON BIỆT LẬP -->
        <iframe src="about:blank" id="page-hub" class="content-frame active"></iframe>
        <iframe src="about:blank" id="page-bank" class="content-frame"></iframe>
        <iframe src="about:blank" id="page-service" class="content-frame"></iframe>
        <iframe src="about:blank" id="page-chat" class="content-frame"></iframe>

        <!-- Nơi Popup thông báo góc màn hình tự động nhảy ra từ utils.js -->
        <div id="notification-container"></div>
    </div>
        <!-- =========================================================
         C. BỘ NÃO JAVASCRIPT ĐIỀU KHIỂN LUỒNG HỆ THỐNG - PHẦN 3
         ========================================================= -->
    <script type="module">
        // Nhập các hàm cốt lõi từ file tiện ích dùng chung
        import { clientDB, showNotificationPopup, setGlobalSession } from './utils.js';

        // Biến toàn cục lưu giữ trạng thái session tạm thời trong file chủ
        window.LOGGED_IN_USER = "";

        // Hàm xử lý lật mặt biểu mẫu Đăng ký / Đăng nhập ở Gateway
                // SỬA TẠI ĐÂY: Đổi toggleFormView thành toggleGateView để ăn khớp với nút bấm HTML
        window.toggleGateView = function(showRegister) {
            document.getElementById("loginFormBox").style.display = showRegister ? "none" : "block";
            document.getElementById("registerFormBox").style.display = showRegister ? "block" : "none";
        };


        // Thuật toán chuyển đổi Tab động Single Page (SPA) cách ly dữ liệu
        window.switchHubTab = function(frameId) {
            // LÁ CHẮN BẢO VỆ: Nếu chưa vượt qua gateway đăng nhập, khóa cứng navbar
            if (!window.LOGGED_IN_USER) return; 

            // Loại bỏ trạng thái bật sáng (active) của các tab cũ
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.content-frame').forEach(frame => frame.classList.remove('active'));

            // Bật sáng tab mới trúng mục tiêu được click
            event.currentTarget.classList.add('active');
            const targetFrame = document.getElementById(frameId);
            targetFrame.classList.add('active');

            // Nếu khung Iframe con đang trống, tiến hành nạp tên file thực tế vào để kích hoạt
            if (targetFrame.src === "about:blank" || targetFrame.src === window.location.href) {
                const fileName = frameId.replace('page-', '') + '.html';
                targetFrame.src = fileName;
            }
        };

        // Hàm tiện ích đăng xuất nhanh, quét sạch dữ liệu cũ và đóng băng Iframe
        window.logoutSystem = async function() {
            try {
                await clientDB.auth.signOut(); // Đăng xuất phiên làm việc ngầm trên cloud
            } catch (e) { console.log(e); }
            
            window.LOGGED_IN_USER = "";
            document.getElementById("gateOverlay").style.display = "flex";
            document.getElementById("agreeCheckbox").checked = false;
            
            // Xóa sạch lịch sử các ô nhập liệu sảnh vào
            document.getElementById("loginEmail").value = "";
            document.getElementById("loginPwd").value = "";
            document.getElementById("regUser").value = "";
            document.getElementById("regEmail").value = "";
            document.getElementById("regPwd").value = "";

            // Trả toàn bộ kính Iframe về trạng thái đóng băng trống rỗng
            document.querySelectorAll('.content-frame').forEach(frame => frame.src = "about:blank");
        };
                // =========================================================
        // 5. THUẬT TOÁN ĐĂNG KÝ VÀ ĐĂNG NHẬP XÁC THỰC EMAIL THỰC TẾ
        // =========================================================
        window.handleGatewayAuth = async function(type) {
            // LÁ CHẮN BẢO VỆ 1: Ép buộc cư dân phải tích chọn ký hợp đồng điều khoản mới cho đi tiếp
            const hasAgreed = document.getElementById("agreeCheckbox").checked;
            if (!hasAgreed) {
                alert("⚠️ Yêu cầu bắt buộc: Bạn phải tích chọn ký chấp thuận điều khoản hợp đồng ở cột bên trái để tiếp tục!");
                return;
            }

            if (type === 'register') {
                const username = document.getElementById("regUser").value.trim();
                const email = document.getElementById("regEmail").value.trim();
                const password = document.getElementById("regPwd").value.trim();

                if (username === "" || email === "" || password === "") {
                    alert("Vui lòng điền đầy đủ tất cả các ô thông tin đăng ký!");
                    return;
                }

                // Chặn tên đăng ký chứa ký tự đặc biệt để hệ thống chạy ổn định
                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    alert("Lỗi: Tên tài khoản chỉ được chứa chữ cái, số và dấu gạch dưới!");
                    return;
                }

                // LÁ CHẮN BẢO VỆ 2: Quét bảng city_users xem Username này đã bị ai chiếm trước chưa
                const { data: existUser, error: checkErr } = await clientDB
                    .from('city_users')
                    .select('username')
                    .eq('username', username);

                if (existUser && existUser.length > 0) {
                    alert("Lỗi: Tên tài khoản này đã được sử dụng bởi cư dân khác!");
                    return;
                }

                // Gọi cổng Supabase Auth gốc gửi link kích hoạt về email người dùng
                const { data: authData, error: authErr } = await clientDB.auth.signUp({
                    email: email,
                    password: password,
                    options: { 
                        data: { display_name: username } // Gài chặt Username vào siêu dữ liệu (Metadata)
                    }
                });

                if (authErr) {
                    alert("Lỗi hệ thống Auth: " + authErr.message);
                    return;
                }

                // ĐỒNG BỘ CLOUD: Khởi tạo Profile và cấp ngay vốn 1.000.000 AD mặc định trong city_bank [🗎1]
                await clientDB.from('city_users').insert([{ username: username, email: email }]);
                await clientDB.from('city_bank').insert([{ username: username, balance: 1000000 }]);

                alert("✉️ THÀNH CÔNG: Hệ thống Independent City đã gửi một liên kết xác thực về hòm thư của bạn! Bạn vui lòng kiểm tra hộp thư đến (hoặc thư rác) nhấn vào link để kích hoạt tài khoản cư dân.");
                window.toggleGateView(false);

            } else if (type === 'login') {
                const email = document.getElementById("loginEmail").value.trim();
                const password = document.getElementById("loginPwd").value.trim();

                if (email === "" || password === "") {
                    alert("Vui lòng nhập đầy đủ Email và Mật khẩu!");
                    return;
                }

                // Tiến hành gọi lệnh đăng nhập thông qua hệ thống Auth của Supabase
                const { data: loginData, error: loginErr } = await clientDB.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (loginErr) {
                    // Nếu tài khoản chưa bấm link kích hoạt gửi về mail, Supabase tự động chặn và báo lỗi ở đây
                    alert("⚠️ Đăng nhập thất bại: " + loginErr.message + " (Hãy đảm bảo bạn đã nhấn vào liên kết xác thực gửi về hòm thư điện tử).");
                    return;
                }

                // Đăng nhập thành công -> Trích xuất ngược tên Username độc nhất từ metadata ra
                window.LOGGED_IN_USER = loginData.user.user_metadata.display_name;
                
                // Đồng bộ danh tính vào bộ nhớ tạm toàn cục trong utils.js để các Iframe con bốc dữ liệu
                setGlobalSession(window.LOGGED_IN_USER, email);

                // Mở khóa ẩn cổng Gateway biến mất dữ liệu
                document.getElementById("gateOverlay").style.display = "none";
                showNotificationPopup("XÁC THỰC", `Chào mừng cư dân [${window.LOGGED_IN_USER}] đã kích hoạt email và đăng nhập mạng thành công!`);
                
                // Kích hoạt nạp file thực tế mặc định cho trang Hub Chủ đầu tiên
                document.getElementById('page-hub').src = 'hub.html';
            }
        };
    </script>
</body>
</html>
